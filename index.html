<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Appointment System</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <header>
        <div class="logo">ServicePortal</div>
        <nav>
            <button class="nav-btn" onclick="showPage('welcome-page')">Home</button>
            <button class="nav-btn" onclick="showPage('admin-panel')">Admin Login</button>
        </nav>
    </header>

    <section id="welcome-page" class="container page">
        <h2 class="section-title">Hamari Services</h2>
        <div id="item-list" class="grid-container">
            </div>
    </section>

    <div id="booking-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="item-info"></div>
            <hr>
            <h3>Apni Details Bharein</h3>
            <form id="appointment-form">
                <input type="text" id="custName" placeholder="Pura Naam" required>
                <input type="text" id="custAddress" placeholder="Pura Pata (Address)" required>
                <input type="tel" id="custMobile" placeholder="Mobile Number" required>
                <button type="submit" class="btn-confirm">Confirm & Book Appointment</button>
            </form>
        </div>
    </div>

    <div style="display:none;">
        <div id="booking-slip" style="padding: 30px; border: 2px solid #333; width: 400px; font-family: Arial;">
            <h2 style="text-align: center; border-bottom: 2px solid #333;">BOOKING CONFIRMATION</h2>
            <p><strong>Order ID:</strong> <span id="slip-id"></span></p>
            <p><strong>Name:</strong> <span id="slip-name"></span></p>
            <p><strong>Mobile:</strong> <span id="slip-mobile"></span></p>
            <p><strong>Address:</strong> <span id="slip-address"></span></p>
            <p><strong>Service:</strong> <span id="slip-item"></span></p>
            <p><strong>Date:</strong> <span id="slip-date"></span></p>
            <p style="text-align: center; margin-top: 20px;">Thank you for booking with us!</p>
        </div>
    </div>

    <section id="admin-panel" class="container page" style="display:none;">
        <div id="admin-login-box" class="login-card">
            <h2>Admin Login</h2>
            <input type="password" id="adminPass" placeholder="Enter Password">
            <button onclick="checkAdminPass()" class="btn-book">Login</button>
        </div>

        <div id="admin-content" style="display:none;">
            <div class="admin-header">
                <h2>Customer Appointments</h2>
                <button class="logout-btn" onclick="adminLogout()">Logout</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Mobile</th>
                            <th>Service</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="admin-data"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
