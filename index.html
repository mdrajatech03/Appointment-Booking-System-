<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Startup Booking App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#020617; color:white; font-family:Arial; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.card { background:#0f172a; padding:15px; margin:10px; border-radius:10px; }
.admin { background:green; }
.delete { background:red; }
</style>
</head>

<body>

<h2>🚀 Startup Booking Dashboard</h2>

<button onclick="login()">Login with Google</button>
<button onclick="logout()">Logout</button>

<div class="card">
<h3>Book Appointment</h3>
<input type="date" id="date">
<input type="time" id="time">
<button onclick="book()">Book</button>
</div>

<div id="adminPanel" style="display:none">
  <div class="card">
    <h3>📊 Analytics</h3>
    <canvas id="chart"></canvas>
  </div>
</div>

<div id="data"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, where, orderBy, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyD-Iqgk4mxo-kh3lPEJnZ8M3LZTGs8CWEI",
  authDomain: "appointment-booking-syst-58963.firebaseapp.com",
  projectId: "appointment-booking-syst-58963",
  storageBucket: "appointment-booking-syst-58963.firebasestorage.app",
  messagingSenderId: "494502187842",
  appId: "1:494502187842:web:195a5d7a5a4441e1daeedb"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let isAdmin = false;

// LOGIN
window.login = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

// LOGOUT
window.logout = async () => {
  await signOut(auth);
  location.reload();
};

// AUTH STATE (FIXED)
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    const userRef = doc(db, "users", user.uid);

    // ✅ Proper user create/update
    await setDoc(userRef, {
      uid: user.uid,
      name: user.displayName,
      email: user.email,
      role: "user"
    }, { merge: true });

    // ✅ Check admin
    const userSnap = await getDoc(userRef);

    if (userSnap.exists() && userSnap.data().role === "admin") {
      isAdmin = true;
      document.getElementById("adminPanel").style.display = "block";
    }

    loadData();
  }
});

// BOOK
window.book = async () => {
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if (!currentUser) {
    alert("Login first!");
    return;
  }

  const q = query(
    collection(db, "appointments"),
    where("date","==",date),
    where("time","==",time)
  );

  const snap = await getDocs(q);

  if (!snap.empty) {
    alert("Slot already booked!");
    return;
  }

  await addDoc(collection(db, "appointments"), {
    userId: currentUser.uid,
    userName: currentUser.displayName,
    date,
    time,
    status: "Pending",
    createdAt: new Date()
  });
};

// LOAD DATA + CHART
let chart;

function loadData() {
  const q = query(collection(db, "appointments"), orderBy("createdAt","desc"));

  onSnapshot(q, (snapshot) => {

    let html = "";
    let stats = {};

    snapshot.forEach(docSnap => {
      const d = docSnap.data();

      stats[d.date] = (stats[d.date] || 0) + 1;

      html += `
      <div class="card">
        ${d.userName}<br>
        ${d.date} - ${d.time}<br>
        Status: ${d.status}<br>

        ${isAdmin ? `
          <button class="admin" onclick="updateStatus('${docSnap.id}','Confirmed')">Confirm</button>
          <button class="delete" onclick="updateStatus('${docSnap.id}','Cancelled')">Cancel</button>
        ` : ""}
      </div>
      `;
    });

    document.getElementById("data").innerHTML = html;

    if (isAdmin) drawChart(stats);
  });
}

// UPDATE STATUS
window.updateStatus = async (id, status) => {
  await updateDoc(doc(db, "appointments", id), { status });
};

// CHART
function drawChart(stats) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(stats),
      datasets: [{
        label: 'Bookings per Day',
        data: Object.values(stats)
      }]
    }
  });
}
</script>

</body>
</html>
